<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You | Haven Tile & Stone</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --teal:#2A3F3C; --gold:#C8A96A; --cream:#FDFAF5; --gray:#6B6B6B; }
  body { font-family:'DM Sans',sans-serif; background:var(--cream); color:#1C1C1C; min-height:100vh; display:flex; flex-direction:column; }
  nav { display:flex; align-items:center; justify-content:space-between; padding:22px 60px; border-bottom:1px solid rgba(200,169,106,0.2); }
  .nav-logo { font-family:'Playfair Display',serif; font-size:1.35rem; font-weight:600; color:var(--teal); text-decoration:none; }
  .nav-logo span { color:var(--gold); }
  .hero {
    flex:1; display:flex; align-items:center; justify-content:center;
    text-align:center; padding:80px 40px;
  }
  .hero-inner { max-width:560px; }
  .check { font-size:3rem; margin-bottom:24px; }
  .eyebrow { font-size:0.72rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--gold); display:block; margin-bottom:16px; }
  h1 { font-family:'Playfair Display',serif; font-size:clamp(2rem,4vw,3rem); color:var(--teal); line-height:1.15; margin-bottom:20px; }
  h1 em { font-style:italic; }
  p { font-size:1rem; color:var(--gray); line-height:1.8; font-weight:300; margin-bottom:36px; }
  .btn { background:var(--teal); color:#fff; padding:14px 36px; font-size:0.82rem; letter-spacing:0.1em; text-transform:uppercase; text-decoration:none; border-radius:2px; display:inline-block; transition:background 0.2s; }
  .btn:hover { background:#3D5954; }
  footer { padding:24px 60px; text-align:center; font-size:0.78rem; color:var(--gray); border-top:1px solid #E2DDD4; }
</style>
</head>
<body>
  <nav>
    <a href="mockup-homepage.html" class="nav-logo">Haven <span>&</span> Stone</a>
  </nav>
  <div class="hero">
    <div class="hero-inner">
      <div class="check">✓</div>
      <span class="eyebrow">Message Received</span>
      <h1>Thank You for<br><em>Reaching Out</em></h1>
      <p>We've received your quote request and Donovan will follow up within 24 hours to schedule your free in-home consultation. We look forward to working with you.</p>
      <a href="mockup-homepage.html" class="btn">Back to Homepage</a>
    </div>
  </div>
  <footer>© 2025 Haven Tile &amp; Stone · Ocean Isle Beach, NC</footer>
</body>
</html>
